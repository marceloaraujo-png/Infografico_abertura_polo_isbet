document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

asse o protocolo de entrada do registro à <strong style=\"font-weight:600; color:#021627;\">Gerência Nacional de Aprendizagem<\u002Fstrong> e à <strong style=\"font-weight:600; color:#021627;\">Supervisão Nacional Institucional<\u002Fstrong>.<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== FASE 5 ===== -->\n    <section style=\"margin-top:42px;\">\n      <div data-reveal=\"\" style=\"display:flex; align-items:center; gap:16px; background:linear-gradient(100deg,#FF6600,#FF8A00); color:#fff; padding:18px 22px; border-radius:20px; box-shadow:0 12px 28px rgba(255,102,0,.28);\">\n        <div style=\"flex:none; width:50px; height:50px; border-radius:15px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 10v6M2 10l10-5 10 5-10 5z\"><\u002Fpath><path d=\"M6 12v5c3 3 9 3 12 0v-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; opacity:.82;\">Fase 5<\u002Fdiv>\n          <div style=\"font-size:20px; font-weight:700; line-height:1.2;\">Habilitação e Cursos<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:18px; display:flex; flex-direction:column; gap:16px;\">\n        <!-- Etapa 8 -->\n        <article data-step-card=\"\" data-open=\"0\" data-reveal=\"\" data-reveal-delay=\"60\" style=\"background:#fff; border:1px solid #ECE7E3; border-radius:18px; box-shadow:0 4px 18px rgba(2,22,39,.05); transition:box-shadow .3s ease;\">\n          <div onclick=\"{{ toggle }}\" style=\"display:flex; align-items:flex-start; gap:18px; padding:20px 22px; cursor:pointer; user-select:none;\">\n  transition:transform .35s ease;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-detail=\"\" style=\"max-height:0; opacity:0; overflow:hidden; transition:max-height .45s ease, opacity .35s ease;\">\n            <div style=\"padding:0 22px 22px 86px;\">\n              <p style=\"font-size:14.5px; color:#3A4450; line-height:1.6; margin:0;\">O cadastro do polo no CNAP é feito pela <strong style=\"font-weight:600; color:#021627;\">Aprendizagem do Escritório Central<\u002Fstrong>. O prazo de habilitação é de <strong style=\"font-weight:600; color:#021627;\">até 45 dias úteis<\u002Fstrong> a partir da data de envio.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <!-- Etapa 9 -->\n        <article data-step-card=\"\" data-open=\"0\" data-reveal=\"\" data-reveal-delay=\"120\" style=\"background:#fff; border:1px solid #ECE7E3; border-radius:18px; box-shadow:0 4px 18px rgba(2,22,39,.05); transition:box-shadow .3s ease;\">\n          <div onclick=\"{{ toggle }}\" style=\"display:flex; align-items:flex-start; gap:18px; padding:20px 22px; cursor:pointer; user-select:none;\">\n            <div style=\"flex:none; width:46px; height:46px; border-radius:14px; background:#FF6600; color:#fff; display:flex; align-items:center; justify-content:center;\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 10v6M2 10l10-5 10 5-10 5z\"><\u002Fpath><path d=\"M6 12v5c3 3 9 3 12 0v-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"flex:1; min-width:0;\">\n              <div style=\"display:flex; align-items:center; gap:9px; flex-wrap:wrap;\">\n                <span style=\"font-size:11px; font-weight:700; letter-spacing:.09em; color:#D45500;\">ETAPA 09<\u002Fspan>\n                <span style=\"display:inline-flex; align-items:center; gap:6px; background:#FFF4E4; color:#A85B00; border:1px solid #F7C77E; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A85B00\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg>validação até 45 dias úteis<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-size:18.5px; font-weight:600; color:#021627; line-height:1.3; margin:3px 0 0;\">Cadastrar os cursos<\u002Fh3>\n              <p style=\"font-size:14.5px; color:#5A6470; line-height:1.55; margin:6px 0 0;\">Após a habilitação do polo, cadastre os cursos conforme a faixa etária dos aprendizes.<\u002Fp>\n            <\u002Fdiv>\n            <div data-chev=\"\" style=\"flex:none; margin-top:8px; color:#9AA3AD; transition:transform .35s ease;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-detail=\"\" style=\"max-height:0; opacity:0; overflow:hidden; transition:max-height .45s ease, opacity .35s ease;\">\n            <div style=\"padding:0 22px 22px 86px;\">\n              <ul style=\"list-style:none; padding:0; margin:0 0 14px;\">\n                <li style=\"display:flex; gap:11px; align-items:flex-start; margin-bottom:11px;\"><span style=\"flex:none; margin-top:7px; width:7px; height:7px; border-radius:50%; background:#FF6600;\"><\u002Fspan><span style=\"font-size:14.5px; color:#3A4450; line-height:1.55;\"><strong style=\"font-weight:600; color:#021627;\">Maiores de 18 anos:<\u002Fstrong> podem ser cadastrados utilizando o CMDCA da Matriz;<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; margin-top:7px; width:7px; height:7px; border-radius:50%; background:#FF6600;\"><\u002Fspan><span style=\"font-size:14.5px; color:#3A4450; line-height:1.55;\"><strong style=\"font-weight:600; color:#021627;\">Menores de 18 anos:<\u002Fstrong> exigem o registro e a Declaração de inscrição dos programas no CMDCA.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n              <div style=\"display:flex; gap:11px; background:#F6F4F2; border-radius:13px; padding:13px 15px;\">\n                <svg width=\"19\" height=\"19\" style=\"flex:none; margin-top:1px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D45500\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:13.5px; color:#5A6470; line-height:1.55;\">O prazo para validação dos cursos é de <strong style=\"font-weight:600; color:#021627;\">até 45 dias úteis<\u002Fstrong> a partir da data de envio.<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <!-- Etapa 10 — final -->\n        <article data-reveal=\"\" data-reveal-delay=\"180\" style=\"background:linear-gradient(115deg,#0c2f52,#021627); color:#fff; border-radius:20px; padding:26px 24px; box-shadow:0 16px 36px rgba(2,22,39,.22); position:relative; overflow:hidden;\">\n          <div style=\"position:absolute; top:-60px; right:-30px; width:180px; height:180px; border-radius:50%; background:radial-gradient(circle, rgba(255,102,0,.4), rgba(255,102,0,0) 70%); pointer-events:none;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-start; gap:18px; position:relative; z-index:2;\">\n            <div style=\"flex:none; width:50px; height:50px; border-radius:15px; background:#FF6600; display:flex; align-items:center; justify-content:center;\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <span style=\"font-size:11px; font-weight:700; letter-spacing:.09em; color:#F7A437;\">ETAPA 10 · CONCLUSÃO<\u002Fspan>\n              <h3 style=\"font-size:21px; font-weight:700; color:#fff; line-height:1.25; margin:4px 0 8px;\">Matrículas autorizadas<\u002Fh3>\n              <p style=\"font-size:15px; color:rgba(255,255,255,.86); line-height:1.6; margin:0;\">Após a validação dos cursos, as matrículas estão autorizadas. O novo polo está pronto para transformar vidas pela <strong style=\"font-weight:600; color:#fff;\">educação e pelo trabalho<\u002Fstrong>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER -->\n    <footer data-reveal=\"\" style=\"margin-top:44px; background:#fff; border:1px solid #ECE7E3; border-radius:20px; padding:26px 26px; box-shadow:0 4px 18px rgba(2,22,39,.05);\">\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:20px; justify-content:space-between;\">\n        <div style=\"display:flex; align-items:center; gap:16px;\">\n          <div style=\"flex:none; width:58px; height:58px; border-radius:16px; background:#F4F1EE; display:flex; align-items:center; justify-content:center; padding:7px;\">\n            <img src=\"765cec34-158b-4e3a-a368-48d6bffa156c\" alt=\"ISBET\" style=\"width:100%; height:100%; object-fit:contain;\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:15px; font-weight:700; color:#021627;\">Supervisão Nacional Institucional<\u002Fdiv>\n            <div style=\"font-size:13px; color:#5A6470; line-height:1.5; margin-top:2px;\">ISBET — Instituto Brasileiro Pró-Educação,<br>Trabalho e Desenvolvimento<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FBF6F6; border:1px solid #F0DEE0; border-radius:14px; padding:14px 18px; min-width:240px;\">\n          <div style=\"font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#BC0C24; margin-bottom:6px;\">Dúvidas? Fale com<\u002Fdiv>\n          <div style=\"font-size:14.5px; font-weight:600; color:#021627;\">Marcelo Araújo<\u002Fdiv>\n          <div style=\"font-size:13px; color:#5A6470; margin:1px 0 6px;\">Supervisor Nacional Institucional<\u002Fdiv>\n          <a href=\"mailto:marcelo.araujo@isbet.org.br\" style=\"display:inline-flex; align-items:center; gap:7px; color:#BC0C24; text-decoration:none; font-size:13px; font-weight:600;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#BC0C24\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 5L2 7\"><\u002Fpath><\u002Fsvg>marcelo.araujo@isbet.org.br<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid #F0EDE9; margin-top:20px; padding-top:16px; font-size:12.5px; color:#9AA3AD;\">Rio de Janeiro · Junho de 2026 — Documento de procedimentos para abertura de polos do Programa de Aprendizagem.<\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n  <div style=\"height:30px;\"><\u002Fdiv>\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:920,&quot;height&quot;:1500},&quot;heroTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;navy&quot;,&quot;options&quot;:[&quot;navy&quot;,&quot;scarlet&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;startExpanded&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showProgressBar&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  glossary = {\n    cmdca: { t: 'CMDCA', d: 'Conselho Municipal dos Direitos da Criança e do Adolescente — autoriza o registro da entidade e do programa, especialmente para menores de 18 anos.' },\n    matriz: { t: 'CMDCA da Matriz', d: 'Pode ser utilizado enquanto o CMDCA da localidade ainda não fornece o registro (Portaria 3.872/2023, Art. 9º, §3º).' },\n    cnap: { t: 'CNAP', d: 'Cadastro Nacional de Aprendizagem Profissional (plataforma Lecom / Gov.br). A habilitação é feita pelo Escritório Central.' },\n    portaria: { t: 'Portaria nº 3.872/2023', d: 'Norma do MTE que regulamenta a aprendizagem profissional. Dispensa, em geral, a Assembleia para a abertura do polo — exceto para menores.' },\n    comodato: { t: 'Comodato', d: 'Cessão gratuita do imóvel formalizada por contrato, que deve estar com validade ativa.' },\n    assembleia: { t: 'Assembleia Geral', d: 'Reunião que delibera a criação do polo e gera a Ata correspondente para registro em cartório.' },\n  };\n\n  rootRef = (el) => { if (el) this.root = el; };\n\n  toggle = (e) => {\n    const card = e.currentTarget.closest('[data-step-card]');\n    if (!card) return;\n    const panel = card.querySelector('[data-detail]');\n    const chev = card.querySelector('[data-chev]');\n    const open = card.dataset.open === '1';\n    if (open) {\n      panel.style.maxHeight = '0px';\n      panel.style.opacity = '0';\n      card.dataset.open = '0';\n      if (chev) chev.style.transform = 'rotate(0deg)';\n      card.style.boxShadow = '0 4px 18px rgba(2,22,39,.05)';\n    } else {\n      panel.style.maxHeight = panel.scrollHeight + 'px';\n      panel.style.opacity = '1';\n      card.dataset.open = '1';\n      if (chev) chev.style.transform = 'rotate(180deg)';\n      card.style.boxShadow = '0 12px 32px rgba(2,22,39,.11)';\n    }\n  };\n\n  showTip = (e) => {\n    const el = e.currentTarget;\n    const def = this.glossary[el.dataset.term];\n    const tip = this.tipEl;\n    if (!def || !tip) return;\n    tip.querySelector('[data-tip-title]').textContent = def.t;\n    tip.querySelector('[data-tip-body]').textContent = def.d;\n    const r = el.getBoundingClientRect();\n    const vw = window.innerWidth;\n    const left = Math.min(Math.max(r.left, 12), Math.max(12, vw - 294));\n    tip.style.left = left + 'px';\n    tip.style.top = (r.top - 12) + 'px';\n    tip.style.transform = 'translateY(-100%)';\n    tip.style.opacity = '1';\n    tip.style.visibility = 'visible';\n  };\n\n  hideTip = () => {\n    if (this.tipEl) { this.tipEl.style.opacity = '0'; this.tipEl.style.visibility = 'hidden'; }\n  };\n\n  componentDidMount() {\n    const root = this.root || document;\n    this.tipEl = root.querySelector('[data-tip]');\n\n    // Hero theme tweak\n    const theme = this.props.heroTheme ?? 'navy';\n    const hero = root.querySelector('[data-hero]');\n    if (hero && theme === 'scarlet') {\n      hero.style.background = 'radial-gradient(120% 120% at 85% -10%, #BC0C24 0%, #73010F 60%)';\n    }\n\n    // Progress bar\n    const bar = root.querySelector('[data-progress]');\n    const track = root.querySelector('[data-progress-track]');\n    if ((this.props.showProgressBar ?? true) === false && track) track.style.display = 'none';\n    this._onScroll = () => {\n      const h = document.documentElement.scrollHeight - window.innerHeight;\n      const pct = h > 0 ? (window.scrollY / h) * 100 : 0;\n      if (bar) bar.style.width = pct.toFixed(1) + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    this._onScroll();\n\n    // Reveal animations\n    const items = [...root.querySelectorAll('[data-reveal]')];\n    items.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      el.style.transition = 'opacity .6s cubic-bezier(.16,.84,.44,1), transform .6s cubic-bezier(.16,.84,.44,1)';\n    });\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((en) => {\n          if (en.isIntersecting) {\n            const el = en.target;\n            const d = parseInt(el.dataset.revealDelay || '0', 10);\n            setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; }, d);\n            io.unobserve(el);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -7% 0px' });\n      items.forEach((el) => io.observe(el));\n    } else {\n      items.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    }\n\n    // Start expanded tweak\n    if (this.props.startExpanded) {\n      requestAnimationFrame(() => {\n        root.querySelectorAll('[data-step-card]').forEach((card) => {\n          const panel = card.querySelector('[data-detail]');\n          const chev = card.querySelector('[data-chev]');\n          if (panel) { panel.style.maxHeight = panel.scrollHeight + 'px'; panel.style.opacity = '1'; }\n          card.dataset.open = '1';\n          if (chev) chev.style.transform = 'rotate(180deg)';\n        });\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      window.removeEventListener('resize', this._onScroll);\n    }\n  }\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      toggle: this.toggle,\n      showTip: this.showTip,\n      hideTip: this.hideTip,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
